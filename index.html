<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Ricardo Tovar</title>
  <meta name="description" content="Ricardo Tovar — Co-fundador de MART Automations. AI Engineer: agentes, automatizaciones y backends con Python, FastAPI y LangChain." />
  <meta name="theme-color" content="#0A1628" />

  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%230A1628'/><text x='50' y='68' font-size='54' font-family='Arial' font-weight='bold' fill='%232AACEE' text-anchor='middle'>RT</text></svg>" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700;800;900&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet" />

  <style>
    :root {
      --navy-deep: #0A1628;
      --navy: #0D2040;
      --blue: #1E7FC0;
      --blue-bright: #2AACEE;
      --white: #ffffff;
      --muted: rgba(255, 255, 255, 0.68);
      --hair: rgba(255, 255, 255, 0.12);
      --glass: rgba(255, 255, 255, 0.06);
      --radius: 14px;
      --font-head: "Montserrat", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      --font-body: "Open Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-text-size-adjust: 100%; scroll-behavior: smooth; }

    body {
      font-family: var(--font-body);
      background: #05080f;
      color: var(--white);
      min-height: 100vh;
      line-height: 1.5;
    }

    /* Columna tipo celular, centrada en desktop */
    .shell {
      position: relative;
      width: 100%;
      max-width: 440px;
      margin: 0 auto;
      background: var(--navy-deep);
      min-height: 100vh;
      min-height: 100dvh;
      overflow: hidden;
    }
    @media (min-width: 480px) {
      .shell {
        margin: 0 auto;
        box-shadow: 0 30px 80px rgba(0, 0, 0, 0.6);
      }
    }

    /* Toggle idioma */
    .lang {
      position: absolute;
      top: 16px;
      right: 16px;
      display: inline-flex;
      background: rgba(0, 0, 0, 0.35);
      border: 1px solid rgba(255, 255, 255, 0.28);
      border-radius: 999px;
      padding: 3px;
      z-index: 6;
      backdrop-filter: blur(6px);
    }
    .lang button {
      font-family: var(--font-head);
      font-weight: 600;
      font-size: 12px;
      letter-spacing: 0.04em;
      color: rgba(255, 255, 255, 0.8);
      background: transparent;
      border: none;
      border-radius: 999px;
      padding: 5px 11px;
      cursor: pointer;
      min-height: 30px;
      transition: background 0.15s, color 0.15s;
    }
    .lang button.active { background: var(--white); color: var(--navy-deep); }

    /* ================= HERO ================= */
    .hero {
      position: relative;
      height: 100vh;
      height: 100dvh;
      min-height: 560px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
    }
    .hero-photo {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center 22%;
      z-index: 0;
    }
    /* Gradientes: oscurece arriba (toggle) y fuerte abajo (texto + fusión con info) */
    .hero-grad {
      position: absolute;
      inset: 0;
      z-index: 1;
      background:
        linear-gradient(to bottom,
          rgba(10, 22, 40, 0.72) 0%,
          rgba(10, 22, 40, 0.15) 18%,
          rgba(10, 22, 40, 0.0) 34%,
          rgba(10, 22, 40, 0.35) 58%,
          rgba(10, 22, 40, 0.86) 82%,
          var(--navy-deep) 100%);
    }
    /* Tinte azul sutil para unificar con la marca */
    .hero-grad::after {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(120% 80% at 50% 12%, rgba(42, 172, 238, 0.16), transparent 55%);
      mix-blend-mode: screen;
    }

    .hero-bottom {
      position: relative;
      z-index: 4;
      padding: 0 22px 26px;
    }
    .eyebrow {
      font-family: var(--font-head);
      font-weight: 700;
      font-size: 0.72rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--blue-bright);
      margin-bottom: 10px;
      text-shadow: 0 1px 10px rgba(0, 0, 0, 0.5);
    }
    .hero-title {
      font-family: var(--font-head);
      font-weight: 800;
      font-size: clamp(2.6rem, 12vw, 3.4rem);
      line-height: 1.0;
      letter-spacing: -0.025em;
      text-shadow: 0 2px 24px rgba(0, 0, 0, 0.55);
    }
    /* Shimmer: un destello cruza el nombre (Ricardo → Tovar) en loop suave */
    .hero-title .nm {
      --base: #ffffff;
      --shine: #7fd0f7;
      background-image: linear-gradient(100deg, var(--base) 44%, var(--shine) 50%, var(--base) 56%);
      background-size: 250% 100%;
      background-position: 150% 0;
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      color: transparent;
      animation: shimmer 5s ease-in-out infinite;
    }
    .hero-title .nm.hl { --base: #2AACEE; --shine: #eaf8ff; animation-delay: 0.18s; }
    @keyframes shimmer {
      0%   { background-position: 150% 0; }
      35%  { background-position: -50% 0; }
      100% { background-position: -50% 0; }
    }

    .scroll-hint {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 22px;
      font-family: var(--font-head);
      font-weight: 600;
      font-size: 0.74rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
    }
    .scroll-hint svg { width: 18px; height: 18px; animation: bob 1.8s ease-in-out infinite; }
    @keyframes bob {
      0%, 100% { transform: translateY(0); opacity: 0.7; }
      50%      { transform: translateY(4px); opacity: 1; }
    }

    /* ================= INFO ================= */
    .info {
      position: relative;
      z-index: 2;
      background: var(--navy-deep);
      padding: 8px 20px 30px;
    }

    .btn-primary {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      min-height: 56px;
      font-family: var(--font-head);
      font-weight: 700;
      font-size: 1.02rem;
      color: var(--white);
      background: linear-gradient(135deg, var(--blue) 0%, var(--blue-bright) 100%);
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      position: relative;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(30, 127, 192, 0.4);
      transition: transform 0.12s, box-shadow 0.12s;
    }
    .btn-primary:active { transform: translateY(1px); }
    .btn-primary svg { width: 22px; height: 22px; }
    @keyframes sheen { 0% { left: -60%; } 55%, 100% { left: 130%; } }
    .btn-primary::after {
      content: "";
      position: absolute; top: 0; left: -60%;
      width: 45%; height: 100%;
      background: linear-gradient(100deg, transparent, rgba(255,255,255,0.35), transparent);
      transform: skewX(-18deg);
      animation: sheen 4.5s ease-in-out 1.2s infinite;
    }

    .label {
      font-family: var(--font-head);
      font-weight: 700;
      font-size: 0.7rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.45);
      margin: 24px 2px 12px;
    }

    .quick { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .quick a {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 7px; min-height: 76px; padding: 12px 6px;
      background: var(--glass);
      border: 1px solid var(--hair);
      border-radius: var(--radius);
      text-decoration: none; color: var(--white);
      transition: background 0.14s, transform 0.14s, border-color 0.14s;
    }
    .quick a:active { transform: translateY(1px); }
    .quick svg { width: 24px; height: 24px; color: var(--blue-bright); }
    .quick span { font-family: var(--font-head); font-weight: 600; font-size: 0.75rem; }

    .links { display: flex; flex-direction: column; gap: 10px; }
    .link-row {
      display: flex; align-items: center; gap: 14px;
      min-height: 62px; padding: 12px 16px;
      background: var(--glass);
      border: 1px solid var(--hair);
      border-radius: var(--radius);
      text-decoration: none; color: var(--white);
      transition: background 0.14s, transform 0.14s, border-color 0.14s;
    }
    .link-row:active { transform: translateY(1px); }
    .link-icon {
      width: 42px; height: 42px; flex: 0 0 42px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 11px;
      background: rgba(42, 172, 238, 0.14);
      color: var(--blue-bright);
    }
    .link-icon svg { width: 22px; height: 22px; }
    .link-text { display: flex; flex-direction: column; min-width: 0; }
    .link-text b { font-family: var(--font-head); font-weight: 600; font-size: 0.96rem; }
    .link-text small { color: var(--muted); font-size: 0.8rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .link-chev { margin-left: auto; color: rgba(255,255,255,0.35); flex: 0 0 auto; transition: transform 0.15s, color 0.15s; }
    .link-chev svg { width: 18px; height: 18px; }

    .bio {
      font-size: 0.94rem;
      color: var(--muted);
      border-left: 3px solid var(--blue);
      padding: 4px 0 4px 16px;
      margin-top: 4px;
    }

    .footer {
      text-align: center;
      margin-top: 30px;
      padding-top: 24px;
      border-top: 1px solid var(--hair);
    }
    .footer .mart-logo {
      width: 150px; max-width: 60%; height: auto;
      margin: 0 auto 10px; display: block;
      filter: brightness(0) invert(1);
      opacity: 0.92;
    }
    .footer .slogan { font-size: 0.78rem; color: rgba(255,255,255,0.4); font-style: italic; }

    /* Reveal */
    @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: none; } }
    [data-reveal] { opacity: 0; animation: fadeUp 0.7s cubic-bezier(0.16,1,0.3,1) both; animation-delay: var(--d, 0s); }

    @media (hover: hover) {
      .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 14px 34px rgba(30,127,192,0.5); }
      .quick a:hover { border-color: var(--blue-bright); background: rgba(255,255,255,0.09); }
      .link-row:hover { border-color: var(--blue-bright); background: rgba(255,255,255,0.09); }
      .link-row:hover .link-chev { transform: translateX(3px); color: var(--blue-bright); }
    }

    .toast {
      position: fixed; left: 50%; bottom: 26px;
      transform: translateX(-50%) translateY(20px);
      background: var(--white); color: var(--navy-deep);
      font-family: var(--font-head); font-weight: 700; font-size: 0.85rem;
      padding: 11px 18px; border-radius: 999px;
      box-shadow: 0 12px 30px rgba(0,0,0,0.4);
      opacity: 0; pointer-events: none;
      transition: opacity 0.25s, transform 0.25s; z-index: 20;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation: none !important; transition: none !important; }
      [data-reveal] { opacity: 1 !important; }
      html { scroll-behavior: auto; }
      /* Nombre sólido (sin shimmer) */
      .hero-title .nm { -webkit-text-fill-color: var(--base); color: var(--base); background: none; }
    }
  </style>
</head>

    /* Enlaces */
    document.getElementById("waLink").href = "https://wa.me/" + PROFILE.phone;
    document.getElementById("mailLink").href = "mailto:" + PROFILE.email;
    document.getElementById("telLink").href = "tel:+" + PROFILE.phone;
    document.getElementById("linkedinLink").href = PROFILE.linkedin;
    document.getElementById("githubLink").href = PROFILE.github;
    document.getElementById("martLink").href = PROFILE.website;

    /* i18n */
    let currentLang = "es";
    function applyLang(lang) {
      currentLang = lang;
      const dict = I18N[lang];
      document.documentElement.lang = lang;
      document.querySelectorAll("[data-i18n]").forEach(el => {
        const key = el.getAttribute("data-i18n");
        if (dict[key] !== undefined) el.textContent = dict[key];
      });
      document.querySelectorAll(".lang button").forEach(b => b.classList.toggle("active", b.dataset.lang === lang));
      try { localStorage.setItem("card-lang", lang); } catch (e) {}
    }
    document.querySelectorAll(".lang button").forEach(btn => btn.addEventListener("click", () => applyLang(btn.dataset.lang)));

    // ES es el idioma por defecto del negocio (vendemos al mercado hispano). Solo cambiamos a EN si el usuario lo eligió explícitamente antes.
    let initial = "es";
    try {
      const saved = localStorage.getItem("card-lang");
      if (saved === "en") initial = "en";
    } catch (e) {}
    applyLang(initial);

    /* vCard */
    function buildVCard() {
      return [
        "BEGIN:VCARD", "VERSION:3.0",
        "N:" + PROFILE.lastName + ";" + PROFILE.firstName + ";;;",
        "FN:" + PROFILE.firstName + " " + PROFILE.lastName,
        "ORG:" + PROFILE.org,
        "TITLE:" + (currentLang === "en" ? PROFILE.titleEn : PROFILE.titleEs),
        "TEL;TYPE=CELL:+" + PROFILE.phone,
        "EMAIL;TYPE=WORK:" + PROFILE.email,
        "URL:" + PROFILE.website,
        "URL;TYPE=LinkedIn:" + PROFILE.linkedin,
        "URL;TYPE=GitHub:" + PROFILE.github,
        "NOTE:" + I18N[currentLang].vcardNote,
        "END:VCARD"
      ].join("\r\n");
    }
    function showToast(msg) {
      const t = document.getElementById("toast");
      t.textContent = msg; t.classList.add("show");
      clearTimeout(t._timer);
      t._timer = setTimeout(() => t.classList.remove("show"), 2200);
    }
    document.getElementById("saveContact").addEventListener("click", () => {
      const blob = new Blob([buildVCard()], { type: "text/vcard;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url; a.download = PROFILE.firstName + "-" + PROFILE.lastName + ".vcf";
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      setTimeout(() => URL.revokeObjectURL(url), 1500);
      showToast(I18N[currentLang].toastSaved);
    });
  </script>
</body>
</html>
